name: Publish image to Amazon ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: cafe

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}" \
            -t "${{ steps.meta.outputs.image_uri }}:latest" \
            .

      - name: Push Docker image tags
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}"
          docker push "${{ steps.meta.outputs.image_uri }}:latest"

      - name: Summarize tagging policy
        run: |
          echo "Imagem publicada: ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}"
          echo "Alias de conveniência: ${{ steps.meta.outputs.image_uri }}:latest"
          echo "Deploy estável e rollback devem reutilizar a tag SHA, sem rebuild."
