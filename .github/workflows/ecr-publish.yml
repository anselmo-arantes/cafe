name: Publish image to Amazon ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: cafe

jobs:
  publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_VERSION: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build artifact with Maven
        run: mvn -B clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            .

      - name: Push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Publish workflow summary
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          {
            echo '## Amazon ECR publish summary'
            echo
            echo "- Version image: \`$REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION\`"
            echo "- Latest image: \`$REGISTRY/$ECR_REPOSITORY:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
