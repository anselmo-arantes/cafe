server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

aws:
  region: sa-east-1
  dynamodb:
    table-name: catalog_products
    sku-index-name: sku-index
    cart-table-name: cart_items
    inventory-table-name: inventory_items
    inventory-reservation-table-name: inventory_reservations
    order-table-name: orders
    payment-table-name: payments

app:
  seed-enabled: false
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:8080
      - http://127.0.0.1:8080
      - https://3wey4ytxf7cvwu6obg52qwtndq0vdbpx.lambda-url.sa-east-1.on.aws/
